title: Automated SSH Brute-Force Detection
id: 4a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
status: experimental
description: Detects high-frequency failed SSH authentication attempts, indicating potential password guessing or credential stuffing.
author: Enzo DeLuca
date: 2026/06/02
references:
    - https://attack.mitre.org/techniques/T1110/001/
tags:
    - attack.credential_access
    - attack.t1110.001
logsource:
    product: linux
    service: sshd
detection:
    selection:
        message|contains:
            - 'Failed password'
            - 'invalid user'
    condition: selection
falsepositives:
    - Automated administrative scripts or configuration management tools (e.g., Ansible, Puppet) misconfigured with expired credentials.
    - Legacy internal service accounts.
level: medium
